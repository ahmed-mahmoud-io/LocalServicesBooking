name: Deploy to MonsterASP.NET

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x' 

    - name: Publish
      run: dotnet publish -c Release -o ./publish

    - name: Take App Offline
      run: |
        echo "<html><body><h1>Maintenance Mode</h1><p>Deploying new version...</p></body></html>" > app_offline.htm
        sudo apt-get update
        sudo apt-get install -y lftp
        lftp -e "set ssl:verify-certificate no; put -O /wwwroot/ app_offline.htm; bye" -u site53172,${{ secrets.FTP_PASSWORD }} site53172.siteasp.net

    - name: FTP Deploy
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: site53172.siteasp.net
        username: site53172
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./publish/
        server-dir: /wwwroot/

    - name: Bring App Online
      run: |
        lftp -e "set ssl:verify-certificate no; rm /wwwroot/app_offline.htm; bye" -u site53172,${{ secrets.FTP_PASSWORD }} site53172.siteasp.net
